name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '0 6 * * 1'   # Mondays 06:00 UTC: re-check against latest RisuAI
  workflow_dispatch:

jobs:
  test:
    name: tests (${{ matrix.os }}, py${{ matrix.python }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python: ['3.11', '3.12', '3.13']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: 'pip'
      - run: python -m pip install -r requirements.txt
      - run: python -m pytest -q

  upstream-drift:
    name: upstream RisuAI drift
    # Only the scheduled / manual runs fetch the moving upstream and compare the
    # emulator + generated docs against it. A failure means Risu changed its Lua
    # API and luapack needs to catch up (bump docgen.RISU_REF and update).
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'
      - run: python -m pip install -r requirements.txt
      - name: Fetch latest RisuAI scriptings.ts
        run: python -m luapack sync-source --ref main
      - name: Check emulator coverage and docs against latest
        run: python -m pytest -q tests/test_api_coverage.py tests/test_docgen.py
